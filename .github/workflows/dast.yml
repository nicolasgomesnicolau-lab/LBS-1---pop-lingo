name: DAST - ZAP Baseline Scan

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dast:
    runs-on: ubuntu-latest
    permissions:
      issues: write      # necessário para criar issues com os alertas
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://lbs-1-pop-lingo.onrender.com'
          fail_action: false
          artifact_name: 'zap-scan-report'   # hífen em vez de underline
          issue_title: 'ZAP Scan Baseline'