name: DAST - ZAP Baseline Scan

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dast:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://lbs-1-pop-lingo.onrender.com'
          fail_action: false
          create_issue: false        # desabilita criação de issues automáticas
          allow_issue_writing: false # não cria nem atualiza issues
        continue-on-error: true      # não falha o pipeline por causa do artifact

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_md.md
            report_json.json
          if-no-files-found: warn