name: DAST Scan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Scan de Segurança Dinâmico (DAST)
    # AQUI ESTÁ O SEGREDO: Você precisa dar permissão de escrita explicitamente
    permissions:
      contents: read
      issues: write 
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://lbs-1-pop-lingo.onrender.com'
          # Removi o issue_links que estava dando erro
          fail_action: false 

      - name: Upload do Relatório
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html