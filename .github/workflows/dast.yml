name: DAST - ZAP Baseline Scan

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://lbs-1-pop-lingo.onrender.com'
          rules_file_name: '.zap/rules.tsv'  # opcional
          fail_action: false                  # não falha o pipeline se achar alertas