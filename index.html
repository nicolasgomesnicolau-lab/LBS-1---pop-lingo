<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LBS #1 - Learn English</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/tabs.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/animations.css">

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <main id="app">
    <!-- Tabs Container -->
    <div class="tabs-container">
      <section id="tab-vocab" class="tab-content"></section>
      <section id="tab-movies" class="tab-content"></section>
      <section id="tab-study" class="tab-content"></section>
      <section id="tab-music" class="tab-content"></section>
      <section id="tab-chat" class="tab-content"></section>
      <section id="tab-profile" class="tab-content"></section>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <div class="nav-item" data-tab="vocab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>Vocab</span>
      </div>
      <div class="nav-item" data-tab="movies">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
        <span>Movies</span>
      </div>
      <!-- Center Tab (Study) -->
      <div class="nav-item nav-item-center" data-tab="study">
        <div class="nav-icon-bg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <span>Estudar</span>
      </div>
      <div class="nav-item" data-tab="music">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span>Music</span>
      </div>
      <div class="nav-item" data-tab="chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Chat</span>
      </div>
      <div class="nav-item" data-tab="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Perfil</span>
      </div>
    </nav>
  </main>

  <!-- Global Elements -->

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>



  <!-- User status bar -->
  <div class="user-bar" id="user-bar" style="display:none">
    <span id="user-bar-email"></span>
    <button id="user-bar-logout">Sair</button>
  </div>

  <!-- Sound Test Button -->
  <button id="sound-test-btn" title="Testar som" style="position:fixed;right:16px;top:50%;width:48px;height:48px;border-radius:50%;background:var(--accent,#6c5ce7);color:#fff;border:2px solid rgba(255,255,255,0.2);font-size:20px;cursor:pointer;z-index:999;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.3);transition:transform 0.15s">🔊</button>

  <!-- Hidden YouTube Player Host -->
  <div id="yt-player-host" style="position:fixed;right:0;bottom:0;width:1px;height:1px;opacity:0.01;pointer-events:none;overflow:hidden"></div>

  <!-- Global Overlay -->
  <div class="modal-overlay" id="global-overlay"></div>

  <!-- Login Screen (full-page, shown on startup) -->
  <div class="login-screen" id="login-screen">
    <div class="login-container">
      <div class="login-logo">🎬</div>
      <h1 class="login-brand">Pop Lingo</h1>
      <p class="login-desc" id="login-subtitle">Acesse sua conta para sincronizar seus estudos</p>

      <div class="login-form">
        <h3 id="login-title">Entrar</h3>

        <div class="input-group mb-base">
          <input type="email" class="input-field" id="login-email" placeholder="Email" autocomplete="email">
        </div>
        <div class="input-group mb-base">
          <input type="password" class="input-field" id="login-password" placeholder="Senha" autocomplete="current-password">
        </div>

        <div class="login-error" id="login-error"></div>

        <button class="btn btn-primary btn-block btn-lg" id="login-btn">Entrar</button>

        <button class="btn btn-link btn-block" id="login-mode-toggle" style="margin-top:var(--space-sm)">Não tem conta? Cadastre-se</button>

        <div class="login-divider"><span>ou</span></div>

        <button class="btn btn-secondary btn-block" id="login-skip-btn">Continuar como visitante</button>
      </div>
    </div>
  </div>

  <!-- Word Translation Bubble (Modal) -->
  <div class="word-bubble" id="word-bubble">
    <div class="word-bubble-close" id="bubble-close-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    
    <div class="word-bubble-word">
      <small>Palavra</small>
      <span id="bubble-word">word</span>
    </div>
    
    <div class="word-bubble-translation">
      <small>Tradução</small>
      <span id="bubble-translation">palavra</span>
    </div>

    <div class="word-bubble-context" id="bubble-context" style="display: none;">
      <small>Contexto</small>
      <p id="bubble-context-text"></p>
    </div>

    <button class="btn btn-secondary btn-block" id="bubble-save-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Salvar na biblioteca
    </button>
  </div>

  <!-- JavaScript Modules -->
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/vocab.js"></script>
  <script src="js/movies.js"></script>
  <script src="js/study.js"></script>
  <script src="js/music.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/app.js"></script>

  <!-- YouTube IFrame Player API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <!-- Sound Test -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('sound-test-btn');
    if (!btn) return;
    btn.addEventListener('click', function() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 200 + Math.random() * 600;
        gain.gain.value = 0.3;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.stop(ctx.currentTime + 0.5);
        var toast = document.getElementById('toast-container');
        if (toast) {
          var el = document.createElement('div');
          el.className = 'toast toast-success';
          el.textContent = 'OK! (' + Math.round(osc.frequency.value) + 'Hz)';
          toast.appendChild(el);
          setTimeout(function() { el.remove(); }, 3000);
        }
      } catch(e) {
        var toast = document.getElementById('toast-container');
        if (toast) {
          var el = document.createElement('div');
          el.className = 'toast toast-error';
          el.textContent = 'Sem som: ' + e.message;
          toast.appendChild(el);
          setTimeout(function() { el.remove(); }, 5000);
        }
      }
    });
  });
  
  // Global YouTube IFrame API Ready Callback
  window.onYouTubeIframeAPIReady = function() {
    if (typeof MoviesTab !== 'undefined' && MoviesTab.onYouTubeIframeAPIReady) {
      MoviesTab.onYouTubeIframeAPIReady();
    }
  };

  </script>

</body>
</html>
